name: Auto Merge PR

on:
pull_request_review:
types: [submitted]

permissions:
contents: write
pull-requests: write

jobs:
auto-merge:
runs-on: ubuntu-latest

```
steps:
  - name: Enable auto merge when approved
    if: github.event.review.state == 'approved'
    run: |
      gh pr merge ${{ github.event.pull_request.number }} \
        --auto \
        --merge
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
